name: "security.txt expiry reminder"

on:
  schedule:
    - cron: "0 9 1 11 *" # Runs November 1st every year
  workflow_dispatch:

permissions:
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Open reminder issue
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Reminder: renew security.txt before January 2027",
              body: "The `/.well-known/security.txt` file expires on **2027-01-01**.\n\nUpdate the `Expires` field and push before that date to stay compliant with RFC 9116.",
              labels: []
            })
